spring:
  application:
    name: expense-tracker

  datasource:
    hikari:
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 60000
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never